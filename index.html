<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('video-handler', {
        schema: {
          videoId: {type: 'string'}
        },
        init: function () {
          const video = document.querySelector(this.data.videoId);

          this.el.addEventListener('targetFound', event => {
            console.log("Encontrado objetivo para: " + this.data.videoId);
            video.play();
          });
          
          this.el.addEventListener('targetLost', event => {
            console.log("Perdido objetivo para: " + this.data.videoId);
            video.pause();
          });
        }
      });
    </script>

    <style>
      body { margin: 0; }
      .example-container { overflow: hidden; position: absolute; width: 100%; height: 100%; }
    </style>
  </head>
  
  <body>
    <div class="example-container">
      <a-scene mindar-image="imageTargetSrc: ./targets.mind; showStats: false;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <video id="video-cardenal" autoplay="true" loop="true" src="Cardenal.mp4"></video>
          <video id="video-colibries" autoplay="true" loop="true" src="Colibries.mp4"></video>
          <video id="video-nido" autoplay="true" loop="true" src="NidoAzul.mp4"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-handler="videoId: #video-cardenal">
          <a-video src="#video-cardenal" position="0 0 0" width="1" height="1"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" video-handler="videoId: #video-colibries">
          <a-video src="#video-colibries" position="0 0 0" width="1" height="1"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2" video-handler="videoId: #video-nido">
          <a-video src="#video-nido" position="0 0 0" width="1" height="1.333"></a-video>
        </a-entity>

      </a-scene>
    </div>
  </body>
</html>
