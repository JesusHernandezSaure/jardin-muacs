<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; font-family: sans-serif; }
      .example-container { overflow: hidden; position: absolute; width: 100%; height: 100%; }
      
      /* Estilos para la pantalla de inicio */
      #start-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      
      #start-button {
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        background-color: #ffffff;
        color: #333333;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }

      #start-button:active {
        background-color: #dddddd;
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const startButton = document.querySelector("#start-button");
        const startScreen = document.querySelector("#start-screen");

        startButton.addEventListener("click", function() {
          const videos = document.querySelectorAll('video');
          
          videos.forEach(video => {
             video.muted = false; 
          });

          startScreen.style.display = "none";
        });
      });

      AFRAME.registerComponent('video-handler', {
        schema: {
          videoId: {type: 'string'}
        },
        init: function () {
          const video = document.querySelector(this.data.videoId);

          this.el.addEventListener('targetFound', event => {
            console.log("Encontrado: " + this.data.videoId);
            video.play();
          });
          
          this.el.addEventListener('targetLost', event => {
            console.log("Perdido: " + this.data.videoId);
            video.pause();
          });
        }
      });
    </script>
  </head>
  
  <body>
    <div id="start-screen">
      <h2 style="color: white; margin-bottom: 20px; text-align: center;">Mis Pinturas AR</h2>
      <button id="start-button">Iniciar Experiencia</button>
    </div>

    <div class="example-container">
      <a-scene mindar-image="imageTargetSrc: ./targets.mind; showStats: false;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <video id="video-cardenal" preload="auto" autoplay="false" loop="true" src="Cardenal.mp4" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
          <video id="video-colibries" preload="auto" autoplay="false" loop="true" src="Colibries.mp4" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
          <video id="video-nido" preload="auto" autoplay="false" loop="true" src="nido.mp4" playsinline webkit-playsinline muted crossorigin="anonymous"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-handler="videoId: #video-cardenal">
          <a-video src="#video-cardenal" position="0 0 0" width="1.35" height="0.75"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" video-handler="videoId: #video-colibries">
          <a-video src="#video-colibries" position="0 0 0" width="1" height="1.45"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2" video-handler="videoId: #video-nido">
          <a-video src="#video-nido" position="0 0 0" width="1" height="1.3"></a-video>
        </a-entity>

      </a-scene>
    </div>
  </body>
</html>
